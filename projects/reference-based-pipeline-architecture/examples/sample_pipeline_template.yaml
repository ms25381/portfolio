# ============================================================
# SAMPLE PIPELINE TEMPLATE
# ============================================================
# Defines HOW a pipeline executes.
#
# Templates contain reusable execution logic and processing
# patterns. They do NOT contain:
#
# - Runtime values
# - Scheduling information
# - Business-specific configuration
#
# Templates are intended to be reused across many pipelines.
# ============================================================

template_id: incremental_customer_template

name: Incremental Customer Load Template

description: >
  Generic incremental ingestion and merge template
  for customer-domain pipelines.

version: 2.0

execution_type: batch

pipeline_pattern: incremental_merge

# ------------------------------------------------------------
# EXECUTION STEPS
# ------------------------------------------------------------

steps:

  - step_id: extract

    description: Read source dataset

    operation: read_source

    required_parameters:

      - source.catalog
      - source.schema
      - source.table

  - step_id: validate_schema

    description: Validate source schema

    operation: validate_schema

    required_contract: true

  - step_id: validate_data

    description: Execute DQ checks

    operation: data_quality_validation

  - step_id: apply_transformations

    description: Standardize and enrich records

    operation: transform

  - step_id: deduplicate

    description: Remove duplicate records

    operation: deduplicate

  - step_id: merge_target

    description: Incremental upsert into target table

    operation: merge

    required_parameters:

      - target.catalog
      - target.schema
      - target.table
      - load_strategy.merge_key

  - step_id: audit

    description: Record metrics and lineage

    operation: audit_logging

# ------------------------------------------------------------
# CONTROL FLOW
# ------------------------------------------------------------

flow:

  start: extract

  sequence:

    - extract
    - validate_schema
    - validate_data
    - apply_transformations
    - deduplicate
    - merge_target
    - audit

# ------------------------------------------------------------
# ERROR HANDLING
# ------------------------------------------------------------

error_handling:

  stop_on_schema_failure: true

  stop_on_dq_failure: true

  retry_failed_step: true

  max_retries: 3

# ------------------------------------------------------------
# REQUIRED REFERENCES
# ------------------------------------------------------------

dependencies:

  requires:

    - schema_contract

    - runtime_parameters

# ------------------------------------------------------------
# AUDIT SETTINGS
# ------------------------------------------------------------

audit:

  capture_row_counts: true

  capture_duration: true

  capture_errors: true

  capture_data_lineage: true

# ------------------------------------------------------------
# REUSABILITY
# ------------------------------------------------------------

supported_use_cases:

  - customer_domain

  - product_domain

  - finance_domain

  - reference_data

  - master_data_management
